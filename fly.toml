# fly.toml app configuration file generated for periodos on 2025-09-22T15:03:47+05:45
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'periodos'
primary_region = 'hkg'

[env]
FRONTEND_URL = "https://periodos.nirjan.net"
COOKIE_DOMAIN = "nirjan.net"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'

[[mounts]]
source = 'data'
destination = '/app/data'
